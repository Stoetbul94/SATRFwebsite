<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a365d" />
    <title>SATRF Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f7fafc;
        color: #1a365d;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: #ffffff;
        border-radius: 12px;
        padding: 2rem 1.5rem;
        box-shadow: 0 4px 24px rgba(26, 54, 93, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
        font-weight: 700;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #4a5568;
        font-size: 1rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #e53e3e;
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
      }
      a:focus {
        outline: 2px solid #1a365d;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>SATRF Offline</h1>
      <p>
        You are currently offline. Some SATRF website features require an internet connection,
        including login, admin, scores and live results.
      </p>
      <a href="/">Return to home</a>
    </main>
  </body>
</html>
